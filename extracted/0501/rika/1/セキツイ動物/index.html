<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セキツイ動物仕分けゲーム</title>
    <link rel="stylesheet" href="/gamedata/game(sort)/style.css" />

    <!-- Supabase SDK -->
    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
      try {
        window.supabaseClient = createClient(
          'https://tvtrbvpczafwzdcnzlyu.supabase.co',
          'sb_publishable_MO7Smx8bj5EaPv67_hZFNA_tc1AOOKY'
        );
      } catch(e) { console.error('Supabase init failed', e); }
    </script>
  </head>

  <body>
    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <h1>セキツイ動物 分類ゲーム</h1>
      <p class="game-meta" style="margin:6px auto 10px; max-width:92%; font-size:13px; color:#cfcfcf; line-height:1.6;"><span style="color:#fed000; font-weight:bold;">中1</span>　/　生物：セキツイ動物の分類　/　約1分</p>

      <p>
        セキツイ動物が降り注いできます！<br />
        ドラッグ＆ドロップして５つに分類しましよう！<br />
        プレイ回数に応じてエンブレム(金・銀・銅)がつくよ！
      </p>

      <p3>Produce by okada</p3>

      <div class="button-container">
        <div class="button-row">
          <button id="bonusToggleButton">ボーナス: OFF</button>
          <button id="startButton" class="medal-button">
            <img id="medalImage" src="" alt="Medal" />
            <span class="start-label">START</span>
          </button>
        </div>
        <button id="backButton">戻る</button>
      </div>

      <div id="rankingContainer">
        <button id="rankingToggleButton">My ベストスコア</button>

        <table id="ranking-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <table id="alt-ranking-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <button id="resetRankingButton">リセット</button>
        <button id="changeNameButton">名前変更</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen" style="display: none">
      <div id="header">
        <div id="timer">Time: 60</div>
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="maxCombo">Max: 0</div>
      </div>
      <div id="playArea"></div>
      <button id="returnButton">Return to START</button>
    </div>

    <!-- ★ ゲーム起動用モジュール（最重要） -->
    <script type="module">
      import wordData from "./worddata.js";
      import { initGame } from "/gamedata/game(sort)/script.js";

      // STARTボタンを押したときにゲーム開始
      document.getElementById("startButton").addEventListener("click", () => {
        initGame(wordData);
      });
    </script>
  </body>
</html>
