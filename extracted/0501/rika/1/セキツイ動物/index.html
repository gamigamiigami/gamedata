<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>セキツイ動物仕分けゲーム</title>
    <link rel="stylesheet" href="/gamedata/game(sort)/style.css" />

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-analytics.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        query,
        orderBy,
        limit
      } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD7ma86vV8lzcXGLxNrj2PbfhsdZiUHrs4",
        authDomain: "gamigame915.firebaseapp.com",
        databaseURL: "https://gamigame915-default-rtdb.firebaseio.com",
        projectId: "gamigame915",
        storageBucket: "gamigame915.firebasestorage.app",
        messagingSenderId: "633340854168",
        appId: "1:633340854168:web:fb547734f6b29107ca537d",
        measurementId: "G-3N3541718C"
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const db = getFirestore(app);

      // script.js から参照できるようにする
      window.firebaseDB = db;
      window.firebaseModules = {
        collection,
        addDoc,
        getDocs,
        query,
        orderBy,
        limit
      };
    </script>
  </head>

  <body>
    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <h1>セキツイ動物 分類ゲーム</h1>
      <p class="game-meta" style="margin:6px auto 10px; max-width:92%; font-size:13px; color:#cfcfcf; line-height:1.6;"><span style="color:#fed000; font-weight:bold;">中1</span>　/　生物：セキツイ動物の分類　/　約1分</p>

      <p>
        セキツイ動物が降り注いできます！<br />
        ドラッグ＆ドロップして５つに分類しましよう！<br />
        プレイ回数に応じてエンブレム(金・銀・銅)がつくよ！
      </p>

      <p3>Produce by okada</p3>

      <div class="button-container">
        <div class="button-row">
          <button id="bonusToggleButton">ボーナス: OFF</button>
          <button id="startButton" class="medal-button">
            <img id="medalImage" src="" alt="Medal" />
            <span class="start-label">START</span>
          </button>
        </div>
        <button id="backButton">戻る</button>
      </div>

      <div id="rankingContainer">
        <button id="rankingToggleButton">My ベストスコア</button>

        <table id="ranking-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <table id="alt-ranking-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <button id="resetRankingButton">リセット</button>
        <button id="changeNameButton">名前変更</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen" style="display: none">
      <div id="header">
        <div id="timer">Time: 60</div>
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="maxCombo">Max: 0</div>
      </div>
      <div id="playArea"></div>
      <button id="returnButton">Return to START</button>
    </div>

    <!-- ★ ゲーム起動用モジュール（最重要） -->
    <script type="module">
      import wordData from "./worddata.js";
      import { initGame } from "/gamedata/game(sort)/script.js";

      // STARTボタンを押したときにゲーム開始
      document.getElementById("startButton").addEventListener("click", () => {
        initGame(wordData);
      });
    </script>
  </body>
</html>
