<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カスタムゲーム</title>
    <link rel="stylesheet" href="/gamedata/game(sort)/style.css" />

    <!-- URLのidからユニークなランキングキーを生成（モジュール実行前に確定させる） -->
    <script>
      (function () {
        var id = new URLSearchParams(location.search).get('id');
        if (id) window.GAME_TITLE = 'custom:' + id;
      })();
    </script>

    <!-- Supabase SDK -->
    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
      try {
        window.supabaseClient = createClient(
          'https://tvtrbvpczafwzdcnzlyu.supabase.co',
          'sb_publishable_MO7Smx8bj5EaPv67_hZFNA_tc1AOOKY'
        );
      } catch (e) { console.error('Supabase init failed', e); }
    </script>
  </head>

  <body>
    <!-- スタート画面 -->
    <div id="startScreen" class="screen" style="display:none;">
      <h1 id="customGameTitle">カスタムゲーム</h1>
      <p id="customGameSubject" style="font-size:13px;color:#cfcfcf;margin:4px auto 10px;max-width:92%;"></p>

      <p>
        単語が降り注いできます！<br />
        ドラッグ＆ドロップして分類しましょう！
      </p>

      <p class="credit">Produce by igami</p>

      <div class="button-container">
        <div class="button-row">
          <button id="bonusToggleButton">ボーナス: OFF</button>
          <button id="startButton" class="medal-button">
            <img id="medalImage" src="" alt="Medal" />
            <span class="start-label">START</span>
          </button>
        </div>
        <button id="backButton">戻る</button>
      </div>

      <div id="rankingContainer">
        <button id="rankingToggleButton">My ベストスコア</button>

        <table id="ranking-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <table id="alt-ranking-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <button id="resetRankingButton">リセット</button>
        <button id="changeNameButton">名前変更</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen" style="display: none">
      <div id="header">
        <div id="timer">Time: 60</div>
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="maxCombo">Max: 0</div>
      </div>
      <div id="playArea"></div>
      <button id="returnButton">Return to START</button>
    </div>

    <!-- 読み込み中 / エラー -->
    <div id="loadingMsg" style="text-align:center;padding:80px 20px;color:#aaa;font-size:16px;">
      ゲームを読み込み中...
    </div>
    <div id="errorMsg" style="text-align:center;padding:80px 20px;color:#f66;font-size:16px;display:none;">
      <p id="errorText"></p>
      <a href="../index.html" style="color:#fed000;">← ゲーム一覧に戻る</a>
    </div>

    <!-- ゲーム起動 -->
    <script type="module">
      import { initGame } from '/gamedata/game(sort)/script.js';

      const params   = new URLSearchParams(location.search);
      const gameId   = params.get('id');
      const titleParam = params.get('title');

      const loadingEl = document.getElementById('loadingMsg');
      const errorEl   = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const startEl   = document.getElementById('startScreen');

      function showError(msg) {
        loadingEl.style.display = 'none';
        errorText.textContent   = msg;
        errorEl.style.display   = 'block';
      }

      if (!gameId) {
        showError('ゲームIDが指定されていません。');
      } else {
        // supabaseClient はヘッドのモジュールで初期化されるため少し待つ
        let waited = 0;
        const tid = setInterval(async () => {
          waited += 50;
          if (!window.supabaseClient && waited < 4000) return;
          clearInterval(tid);

          if (!window.supabaseClient) {
            showError('データベースに接続できませんでした。');
            return;
          }

          const { data, error } = await window.supabaseClient
            .from('custom_games')
            .select('*')
            .eq('id', gameId)
            .single();

          if (error || !data) {
            showError('ゲームが見つかりませんでした。');
            return;
          }

          // 問題データを解析
          let wordData;
          try {
            wordData = parseWordData(data.word_data);
          } catch (e) {
            showError('問題データの解析に失敗しました：' + e.message);
            return;
          }

          if (!Array.isArray(wordData) || wordData.length === 0) {
            showError('問題データが空です。');
            return;
          }

          // タイトル・教科を表示
          document.getElementById('customGameTitle').textContent = data.title || 'カスタムゲーム';
          if (data.subject) {
            document.getElementById('customGameSubject').textContent = data.subject;
          }
          document.title = data.title || 'カスタムゲーム';

          // ローカルの backButton をゲーム一覧に向ける
          const backBtn = document.getElementById('backButton');
          if (backBtn) backBtn.addEventListener('click', () => { location.href = '../index.html'; });

          // 読み込み完了 → スタート画面を表示
          loadingEl.style.display = 'none';
          startEl.style.display   = 'block';

          document.getElementById('startButton').addEventListener('click', () => {
            initGame(wordData);
          });
        }, 50);
      }

      // wordData.js形式（const wordData = [...]; export default ...）または JSON配列を受け付ける
      function parseWordData(raw) {
        if (Array.isArray(raw)) return raw;
        if (typeof raw !== 'string') throw new Error('不明な形式');
        // JS形式をJSON配列に変換
        let s = raw.trim();
        // "const wordData = [...];" 形式
        s = s.replace(/^(?:const|let|var)\s+\w+\s*=\s*/, '');
        // "export default wordData;" 末尾を除去
        s = s.replace(/;\s*export\s+default\s+\w+\s*;?\s*$/, '');
        s = s.replace(/export\s+default\s+\w+\s*;?\s*$/, '');
        // 末尾セミコロン除去
        s = s.replace(/;\s*$/, '').trim();
        return JSON.parse(s);
      }
    </script>
  </body>
</html>
