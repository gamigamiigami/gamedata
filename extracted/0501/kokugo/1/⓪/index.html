<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹の節・文の節</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-analytics.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        query,
        orderBy,
        limit
      } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD7ma86vV8lzcXGLxNrj2PbfhsdZiUHrs4",
        authDomain: "gamigame915.firebaseapp.com",
        databaseURL: "https://gamigame915-default-rtdb.firebaseio.com",
        projectId: "gamigame915",
        storageBucket: "gamigame915.firebasestorage.app",
        messagingSenderId: "633340854168",
        appId: "1:633340854168:web:fb547734f6b29107ca537d",
        measurementId: "G-3N3541718C"
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const db = getFirestore(app);

      window.firebaseDB = db;
      window.firebaseModules = { collection, addDoc, getDocs, query, orderBy, limit };
    </script>
  </head>
  <body>
    <!-- 全体を中央に配置するラッパー -->
    <div id="scale-wrapper">
      <!-- ゲーム全体のコンテナ（初期状態で非表示にせずスタート画面だけ表示） -->
      <div id="game-container">
        <!-- ゲームスタート画面（初期表示） -->
        <div id="start-screen">
          <button id="back-button" class="back-button">← 戻る</button>
          <h2>
            竹をちょうどいいサイズに<br />切って収穫しよう！<br />
            <br />「文節」サイズが<br />ちょうどよさそうだ！
          </h2>
          <p class="game-meta" style="margin:10px auto; max-width:90%; font-size:13px; color:#333; background:#fff3cd; border:2px solid #ffc107; border-radius:6px; padding:6px 10px; display:inline-block; line-height:1.6;"><strong>中1〜</strong>　/　文法：文を文節に区切る　/　約1分</p>
          <button id="start-button">スタート</button>

          <div id="rankingContainer">
            <button id="rankingToggleButton">My ベストスコア</button>

            <table id="ranking-table">
              <thead>
                <tr>
                  <th>日付</th>
                  <th>プレイヤー名</th>
                  <th>スコア</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>

            <table id="alt-ranking-table">
              <thead>
                <tr>
                  <th>順位</th>
                  <th>プレイヤー名</th>
                  <th>スコア</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>

            <button id="resetRankingButton">リセット</button>
            <button id="changeNameButton">名前変更</button>
            <button id="globalResetButton" style="display:none;">グローバルリセット</button>
          </div>
        </div>

        <!-- ゲームコンテナ内のコンテンツ（ゲーム中のみ表示） -->
        <div id="game-container-inner" class="hidden">
          <!-- ヘッダー：タイマーとスコア表示 -->
          <div id="header">
            <div id="timer">Time: 60</div>
            <div id="score">Score: 0</div>
          </div>

          <!-- 竹の背景をイメージしたエリア -->
          <div id="bamboo-container">
            <!-- harvest-errorエフェクト用に #bamboo に対してアニメを付ける -->
            <div id="bamboo">
              <!-- キャンバスに問題文（縦書き）を描画し、ドラッグで回答 -->
              <canvas id="drawingCanvas"></canvas>
            </div>
          </div>

          <!-- 収穫ボタン -->
          <button id="harvest-button">収穫する</button>

          <!-- ゲーム終了時の結果画面 -->
          <div id="result" class="hidden">
            <h2>ゲーム終了！</h2>
            <p id="final-score"></p>
            <p id="final-rank"></p>
            <button id="restart-button">もう一度</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
