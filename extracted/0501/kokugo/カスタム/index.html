<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My品詞仕分けゲーム</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-analytics.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        query,
        orderBy,
        limit
      } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDE2tXcwqCNqQZ72ON_48-Qkd9xGfy9y0Y",
        authDomain: "rank-cf9fe.firebaseapp.com",
        databaseURL: "https://rank-cf9fe-default-rtdb.firebaseio.com",
        projectId: "rank-cf9fe",
        storageBucket: "rank-cf9fe.firebasestorage.app",
        messagingSenderId: "45390799176",
        appId: "1:45390799176:web:fb547734f6b29107ca537d",
        measurementId: "G-3N3541718C"
      };

      const app = initializeApp(firebaseConfig);
      getAnalytics(app);
      window.firebaseDB = getFirestore(app);
      window.firebaseModules = { collection, addDoc, getDocs, query, orderBy, limit };
    </script>
  </head>
  <body>
    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <h1>品詞カスタム</h1>
      <p>
        練習したい品詞を選ぼう！<br />
        ランキングでみんなと競えるぞ！
      </p>
      <p class="credit">Produce by igami</p>

      <div id="typeSelection">
        <h3>出題する品詞を選択してください</h3>
        <div id="typeCheckboxes">
          <!-- チェックボックスはJavaScriptで動的に生成 -->
        </div>
      </div>

      <div class="button-container">
        <div class="button-row">
          <button id="bonusToggleButton">ボーナス: OFF</button>
          <button id="startButton">START</button>
        </div>
        <button id="backButton">戻る</button>
      </div>

      <div id="rankingContainer">
        <button id="rankingToggleButton">グローバルランキング</button>

        <!-- Local ranking (localStorage) — shown by default -->
        <table id="ranking-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <!-- Global ranking (Firestore) — hidden by default -->
        <table id="alt-ranking-table" style="display:none;">
          <colgroup>
            <col style="width: 10%" />
            <col style="width: 45%" />
            <col style="width: 25%" />
          </colgroup>
          <thead>
            <tr>
              <th>順位</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <button id="resetRankingButton">リセット</button>
        <button id="changeNameButton">名前変更</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen" style="display: none">
      <div id="header">
        <div id="timer">Time: 60</div>
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="maxCombo">Max: 0</div>
      </div>
      <div id="playArea"></div>
      <button id="returnButton">Return to START</button>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
