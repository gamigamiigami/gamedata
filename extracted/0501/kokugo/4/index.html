                const len = val.length;
                if (len > 4) {
                    p.style.fontSize = '0.85rem';
                } else {
                    p.style.fontSize = '1rem';
                }
                
                piecesRow.appendChild(p);
                pieceElements.set(id, p);
            });
            
            // Lv4（用言モード）とLv5の場合、活用の種類ピースを追加
            const showKatsuyoTypePieces = (currentLevel === 5) || (currentLevel === 4 && currentCategory === 'all');
            if (showKatsuyoTypePieces) {
                const typeSection = document.createElement("div");
                typeSection.className = "piece-section";
                typeSection.innerHTML = '<div class="piece-label">【活用の種類】</div><div class="pieces-row" id="type-pieces"></div>';
                container.appendChild(typeSection);
                
                const typePiecesRow = typeSection.querySelector(".pieces-row");
                // 常に7択（動詞5種 + 形容詞 + 形容動詞）
                let types = ['五段活用', '上一段活用', '下一段活用', 'カ変活用', 'サ変活用', '形容詞', '形容動詞'];
                
                types.sort(() => Math.random() - 0.5);
                
                types.forEach((type, i) => {
                    const p = document.createElement("div");
                    p.className = "piece katsuyo-type";
                    p.textContent = type;
                    const id = `type-${i}-${Date.now()}`;
                    p.dataset.pieceId = id;
                    p.onclick = () => selectPiece(p);
                    
                    // 活用の種類は5文字基準（すでに設定済み）
                    // 他のピースと統一感を持たせるため、念のため設定
                    const len = type.length;
                    if (len >= 5) {
                        p.style.fontSize = '0.85rem';
                    } else if (len > 4) {
                        p.style.fontSize = '0.9rem';
                    } else {
                        p.style.fontSize = '1rem';
                    }
                    
                    typePiecesRow.appendChild(p);
                    pieceElements.set(id, p);
                });
            }
            
            selectedPiece = null;
            updateLevelButtons();
            adjustDropFontSize();
        }

        function selectPiece(piece) {
            if (buttonsDisabled) return;
            if (piece.classList.contains("hidden")) return;
            
            if (selectedPiece) {
                selectedPiece.classList.remove("selected");
            }
            selectedPiece = piece;
            piece.classList.add("selected");
        }

        function dropPiece(zone) {
            if (buttonsDisabled) return;
            if (zone.classList.contains("disabled")) return;
            
            // 既に設置されているピースをクリックした場合は解除
            if (zone.classList.contains("filled")) {
                // spanで囲まれている場合はspanの中身を取得
                const text = zone.querySelector('span') ? zone.querySelector('span').textContent : zone.textContent;
                
                // ピース一覧から対応するピースを探して表示
                pieceElements.forEach((piece, id) => {
                    if (piece.classList.contains("hidden") && piece.textContent === text) {
                        piece.classList.remove("hidden");
                        zone.textContent = "";
                        zone.classList.remove("filled", "correct", "incorrect");
                        return;
                    }
                });
                return;
            }
            
            // 新しいピースを設置
            if (!selectedPiece) return;
            
            zone.textContent = selectedPiece.textContent;
            zone.classList.add("filled");
            selectedPiece.classList.add("hidden");
            selectedPiece.classList.remove("selected");
            selectedPiece = null;
            adjustDropFontSize();
        }
        
        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            display.textContent = `${timeRemaining}秒`;
            
            display.classList.remove('warning', 'danger');
            if (timeRemaining <= 10) {
                display.classList.add('danger');
            } else if (timeRemaining <= 20) {
                display.classList.add('warning');
            }
        }
        
        function updateStreakDisplay() {
            const display = document.getElementById('streak-display');
            const count = document.getElementById('streak-count');
            count.textContent = streak;
            
            if (streak >= 3) {
                display.classList.add('show');
            } else {
                display.classList.remove('show');
            }
        }
        
        function showCombo(text, color) {
            const combo = document.getElementById('combo-display');
            combo.textContent = text;
            combo.style.color = color;
            combo.classList.add('show');
            
            setTimeout(() => {
                combo.classList.remove('show');
            }, 1500);
        }
        
        // dropゾーンのテキストを取得（spanで囲まれている場合も対応）
        function getDropText(zone) {
            const span = zone.querySelector('span');
            return span ? span.textContent : zone.textContent;
        }

        function checkAnswers() {
            if (buttonsDisabled) return;
            if (isChecking) return; // 連打防止
            
            isChecking = true; // 処理中フラグON
            
            let allCorrect = true;
            let correctCount = 0;
            let totalCount = 0;
            
            // 便利表モードの答え合わせ
            if (currentCategory === 'benri') {
                document.querySelectorAll('.drop:not(.disabled)').forEach(zone => {
                    const key = zone.dataset.key; // "rowIdx-key-valIdx"
                    const [rowIdx, katsuyo, valIdx] = key.split('-');
                    
                    // その活用形の正解候補を全て取得
                    const correctAnswers = benriData.rows[rowIdx].values[katsuyo];
                    
                    const userAnswer = getDropText(zone).trim();
                    totalCount++;
                    
                    if (!userAnswer || userAnswer === "") {
                        zone.classList.add('incorrect');
                        allCorrect = false;
                    } else if (correctAnswers.includes(userAnswer)) {
                        // 順不同判定：正解候補に含まれていればOK
                        zone.classList.add('correct');
                        correctCount++;
                    } else {
                        zone.classList.add('incorrect');
                        allCorrect = false;
                    }
                });
                
                if (allCorrect) {
                    streak++;
                    updateStreakDisplay();
                    
                    let comboBonus = 0;
                    const comboMsg = comboMessages.find(c => c.streak === streak);
                    if (comboMsg) {
                        showCombo(comboMsg.text, comboMsg.color);
                        comboBonus = streak * 50;
                    }
                    
                    let points = totalCount * currentLevel * 50 + comboBonus;
                    score += points;
                    updateScore();
                    
                    celebrateCorrect();
                    
                    const msg = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                    showMessage(`${msg} +${points}pt`, "#2e7d32");
                    
                    setTimeout(() => {
                        // 時間切れチェック
                        if (timeRemaining <= 0) {
                            isChecking = false;
                            showGameOver();
                            return;
                        }
                        setup(); // 便利表は1問なので再セットアップ
                        isChecking = false;
                    }, 1500);
                } else {
                    streak = 0;
                    updateStreakDisplay();
                    
                    addPenaltyTime();
                    
                    // 時間切れの場合は処理をスキップ（ゲームオーバー処理はaddPenaltyTime内で実行）
                    if (timeRemaining <= 0) {
                        isChecking = false;
                        return;
                    }
                    
                    const msg = incorrectMessages[Math.floor(Math.random() * incorrectMessages.length)];
                    showMessage(`${msg} -3秒 (${correctCount}/${totalCount}正解)`, "#c62828");
                    
                    // 間違った解答欄だけクリアし、ピースを復活
                    setTimeout(() => {
                        document.querySelectorAll('.drop.incorrect').forEach(zone => {
                            const text = getDropText(zone);
                            if (text && text.trim() !== "") {
                                pieceElements.forEach((piece, id) => {
                                    if (piece.classList.contains("hidden") && piece.textContent === text) {
                                        piece.classList.remove("hidden");
                                    }
                                });
                            }
                            zone.textContent = "";
                            zone.classList.remove('filled', 'incorrect');
                        });
                        document.querySelectorAll('.drop.correct').forEach(zone => {
                            zone.classList.remove('correct');
                        });
                        isChecking = false;
                    }, 1500);
                }
                return;
            }
            
            if (isPenalty) {
                if (penaltyType === 1) {
                    document.querySelectorAll('.drop').forEach(zone => {
                        const answer = zone.dataset.answer;
                        const userAnswer = getDropText(zone).trim();
                        totalCount++;
                        
                        // 空欄は不正解
                        if (!userAnswer || userAnswer === "") {
                            zone.classList.add('incorrect');
                            allCorrect = false;
                        } else if (userAnswer === answer) {
                            zone.classList.add('correct');
                            correctCount++;
                        } else {
                            zone.classList.add('incorrect');
                            allCorrect = false;
                        }
                    });
                } else {
                    // type2: 動詞の続く言葉, type3: 形容詞の活用語尾, type4: 形容動詞の活用語尾（順不同判定）
                    const q = penaltyQuestions[`type${penaltyType}`];
                    
                    // すべてのdropゾーンを取得（空も含む）
                    document.querySelectorAll('.drop:not(.disabled)').forEach(zone => {
                        const text = getDropText(zone);
                        const key = zone.dataset.key;
                        const [katsuyo, index] = key.split('-');
                        
                        totalCount++;
                        
                        // 空欄の場合は不正解
                        if (!text || text.trim() === "") {
                            zone.classList.add('incorrect');
                            allCorrect = false;
                        } else {
                            // 正解候補を取得（命令形の×は含める、語幹の×は除外）
                            let correctAnswers = q.conjugations[katsuyo] || [];
                            
                            // 語幹の場合は×を除外
                            if (katsuyo === 'stem') {
                                correctAnswers = correctAnswers.filter(a => a !== "×");
                            }
                            
                            if (correctAnswers.includes(text.trim())) {
                                zone.classList.add('correct');
                                correctCount++;
                            } else {
                                zone.classList.add('incorrect');
                                allCorrect = false;
                            }
                        }
                    });
                }
                
                if (allCorrect) {
                    const msg = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                    showMessage("ペナルティクリア！ " + msg, "#2e7d32");
                    
                    // ペナルティモード終了
                    isPenalty = false;
                    penaltyType = null;
                    document.body.classList.remove('penalty-mode');
                    document.getElementById('next-btn').classList.remove('disabled');
                    
                    // 通常問題に戻ってタイマー再開
                    setTimeout(() => {
                        // 時間切れチェック
                        if (timeRemaining <= 0) {
                            isChecking = false;
                            showGameOver();
                            return;
                        }
                        setupNormalQuestion(); // タイマーをリセットしない専用関数
                        startTimer(false); // タイマー再開（残り時間から）
                        isChecking = false; // フラグ解除
                    }, 1500);
                } else {
                    const msg = incorrectMessages[Math.floor(Math.random() * incorrectMessages.length)];
                    showMessage(msg + ` (${correctCount}/${totalCount}正解)`, "#c62828");
                    
                    // 間違った解答欄だけクリアし、ピースを復活させる
                    setTimeout(() => {
                        document.querySelectorAll('.drop.incorrect').forEach(zone => {
                            const text = getDropText(zone);
                            
                            // ピース一覧から対応するピースを探して復活
                            if (text && text.trim() !== "") {
                                pieceElements.forEach((piece, id) => {
                                    if (piece.classList.contains("hidden") && piece.textContent === text) {
                                        piece.classList.remove("hidden");
                                    }
                                });
                            }
                            
                            // 解答欄をクリア
                            zone.textContent = "";
                            zone.classList.remove('filled', 'incorrect');
                        });
                        
                        // correctクラスだけ削除（正解はそのまま維持）
                        document.querySelectorAll('.drop.correct').forEach(zone => {
                            zone.classList.remove('correct');
                        });
                        isChecking = false; // フラグ解除
                    }, 1500);
                }
                return;
            }
            
            const q = shuffledQuestions[idx];
            
            // Lv4（用言モード）とLv5では活用の種類もチェック
            const checkKatsuyoType = (currentLevel === 5) || (currentLevel === 4 && currentCategory === 'all');
            if (checkKatsuyoType) {
                const katsuyoType = document.getElementById("katsuyo-type");
                const answer = katsuyoType.dataset.answer;
                const userAnswer = getDropText(katsuyoType).replace(/[（）]/g, "").trim();
                
                totalCount++;
                // 空欄は不正解
                if (!userAnswer || userAnswer === "") {
                    katsuyoType.classList.add('incorrect');
                    allCorrect = false;
                } else if (userAnswer === answer) {
                    katsuyoType.classList.add('correct');
                    correctCount++;
                } else {
                    katsuyoType.classList.add('incorrect');
                    allCorrect = false;
                }
            }
            
            document.querySelectorAll('.drop:not(.disabled)').forEach(zone => {
                const key = zone.dataset.key;
                const [katsuyo, index] = key.split('-');
                const allAnswersForKatsuyo = q.conjugations[katsuyo];
                const userAnswer = getDropText(zone).trim();
                
                totalCount++;
                // 空欄は不正解
                if (!userAnswer || userAnswer === "") {
                    zone.classList.add('incorrect');
                    allCorrect = false;
                } else if (allAnswersForKatsuyo.includes(userAnswer)) {
                    zone.classList.add('correct');
                    correctCount++;
                } else {
                    zone.classList.add('incorrect');
                    allCorrect = false;
                }
            });
            
            if (allCorrect) {
                // 連続正解カウント
                streak++;
                updateStreakDisplay();
                
                // コンボボーナス
                let comboBonus = 0;
                const comboMsg = comboMessages.find(c => c.streak === streak);
                if (comboMsg) {
                    showCombo(comboMsg.text, comboMsg.color);
                    comboBonus = streak * 50;
                }
                
                let points = currentAsks.length * currentLevel * 100 + comboBonus;
                if (currentLevel === 5) points += 100;
                score += points;
                updateScore();
                
                celebrateCorrect();
                
                const msg = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                showMessage(`${msg} +${points}pt`, "#2e7d32");
                
                setTimeout(() => {
                    // 時間切れチェック
                    if (timeRemaining <= 0) {
                        isChecking = false;
                        showGameOver();
                        return;
                    }
                    nextWord();
                    isChecking = false; // フラグ解除
                }, 1500);
            } else {
                // 連続正解リセット
                streak = 0;
                updateStreakDisplay();
                
                addPenaltyTime();
                
                // 時間切れの場合はペナルティ問題に移行しない（ゲームオーバー処理はaddPenaltyTime内で実行）
                if (timeRemaining <= 0) {
                    isChecking = false;
                    return;
                }
                
                const msg = incorrectMessages[Math.floor(Math.random() * incorrectMessages.length)];
                showMessage(`${msg} -3秒 (${correctCount}/${totalCount}正解)`, "#c62828");
                setTimeout(() => {
                    // 品詞モードに応じてペナルティ問題を選択
                    let penaltyTypes;
                    if (currentCategory === 'doushi') {
                        // 動詞モード: type1（活用形）+ type2（動詞の続く言葉）
                        penaltyTypes = [1, 2];
                    } else if (currentCategory === 'keiyou') {
                        // 形容詞＆形容動詞モード: type1（活用形）+ type3（形容詞）+ type4（形容動詞）
                        penaltyTypes = [1, 3, 4];
                    } else {
                        // 用言モード: 全種類
                        penaltyTypes = [1, 2, 3, 4];
                    }
                    const type = penaltyTypes[Math.floor(Math.random() * penaltyTypes.length)];
                    setupPenalty(type);
                    isChecking = false; // フラグ解除
                }, 1500);
            }
        }
        
        // 正解エフェクト：紙吹雪
        function celebrateCorrect() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function showMessage(txt, color) {
            const m = document.getElementById("message");
            m.textContent = txt;
            m.style.color = color;
            m.style.display = "block";
            setTimeout(() => m.style.display = "none", 1500);
        }

        function setLevel(lv) { 
            if (gameStarted) return; // ゲーム中は変更不可
            currentLevel = lv;
            updateLevelButtons();
            updateBestScoreDisplay();
        }
        
        function setCategory(cat) {
            if (gameStarted) return; // ゲーム中は変更不可
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const lv0Btn = document.getElementById('lv0-btn');
            const lv4Btn = document.getElementById('lv4-btn');
            const lv5Btn = document.getElementById('lv5-btn');
            
            if (cat === 'benri') {
                // 便利表モード: Lv0-3のみ
                lv0Btn.style.display = '';
                lv4Btn.style.display = 'none';
                lv5Btn.style.display = 'none';
                if (currentLevel > 3) {
                    currentLevel = 1;
                    updateLevelButtons();
                }
            } else if (cat === 'doushi') {
                // 動詞モード: Lv1-5
                lv0Btn.style.display = 'none';
                lv4Btn.style.display = '';
                lv5Btn.style.display = '';
            } else {
                // 形容詞・用言モード: Lv1-4
                lv0Btn.style.display = 'none';
                lv4Btn.style.display = '';
                lv5Btn.style.display = 'none';
                if (currentLevel === 5) {
                    currentLevel = 1;
                    updateLevelButtons();
                }
            }
            
            updateBestScoreDisplay();
        }
        
        // ゲーム開始
        function startGame() {
            gameStarted = true;
            // カテゴリ・レベル選択を非表示、アクションボタンを表示
            document.getElementById('category-row').style.display = 'none';
            document.getElementById('level-row').style.display = 'none';
            document.getElementById('start-row').style.display = 'none';
            document.getElementById('action-row').style.display = '';
            
            score = 0;
            streak = 0;
            updateScore();
            updateStreakDisplay();
            shuffleQuestions();
            
            // 3秒カウントダウンを表示
            showCountdown();
        }
        
        function showCountdown() {
            const overlay = document.getElementById('countdown-overlay');
            const number = document.getElementById('countdown-number');
            const message = document.getElementById('countdown-message');
            let count = 3;
            
            const messages = [
                "準備はいいかな？",
                "集中して！",
                "頑張ろう！",
                "スタート！"
            ];
            
            overlay.style.display = 'flex';
            number.textContent = count;
            message.textContent = messages[3 - count];
            
            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    number.textContent = count;
                    message.textContent = messages[3 - count];
                    // アニメーションをリセット
                    number.style.animation = 'none';
                    setTimeout(() => {
                        number.style.animation = 'countdown-pulse 1s ease-in-out';
                    }, 10);
                } else {
                    // 0秒の時は「スタート！」を表示
                    number.textContent = "スタート！";
                    message.textContent = "";
                    number.style.fontSize = "6rem";
                    setTimeout(() => {
                        clearInterval(countdownInterval);
                        overlay.style.display = 'none';
                        number.style.fontSize = "10rem";
                        // カウントダウン終了後にゲーム開始
                        setup();
                    }, 500);
                }
            }, 1000);
        }
        
        function updateLevelButtons() {
            const levels = [0, 1, 2, 3, 4, 5];
            document.querySelectorAll('.level-btn').forEach((btn, i) => {
                btn.classList.toggle('active', levels[i] === currentLevel);
            });
        }
        
        function resetCurrent() {
            if (buttonsDisabled) return;
            if (isPenalty) {
                setupPenalty(penaltyType);
            } else {
                setup();
            }
        }
        
        function nextWord() {
            // ペナルティ中は無効
            if (isPenalty) return;
            
            // 便利表モードは1問なのでsetupを呼び直す
            if (currentCategory === 'benri') {
                setup();
                return;
            }
            
            idx = (idx + 1) % shuffledQuestions.length;
            setup();
        }

        // 長いテキストのフォントサイズを自動調整（背景サイズは固定）
        function adjustDropFontSize() {
            document.querySelectorAll('.drop, #katsuyo-type').forEach(d => {
                // 既存のspanからテキストを取得、またはd自体のテキストを取得
                const existingSpan = d.querySelector('span');
                const text = existingSpan ? existingSpan.textContent : d.textContent;
                const len = text.length;
                
                // 空のテキストや特殊文字はスキップ
                if (!text || text === "？" || text === "×" || text.trim() === "") {
                    return;
                }
                
                // 文字数に応じてフォントサイズを段階的に小さくする
                let fontSize;
                if (len >= 5) {
                    fontSize = '0.7rem';  // かなり長い場合
                } else if (len >= 4) {
                    fontSize = '0.8rem';  // サ変語幹など
                } else if (len >= 3) {
                    fontSize = '0.9rem';
                } else {
                    fontSize = '1.05rem'; // 1〜2文字は大きく
                }
                
                // 既存のspanがあればフォントサイズだけ更新
                if (existingSpan) {
                    existingSpan.style.fontSize = fontSize;
                } else {
                    // 新しいspanで囲む
                    const span = document.createElement('span');
                    span.textContent = text;
                    span.style.fontSize = fontSize;
                    d.textContent = '';
                    d.appendChild(span);
                }
            });
        }

        
        // ビューポート高さを設定（iOS Safari対応）
        function setViewportHeight() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        // 画面向き変更時の処理
        function handleOrientationChange() {
            setViewportHeight();
        }
        
        // イベントリスナー登録
        window.addEventListener('resize', handleOrientationChange);
        window.addEventListener('orientationchange', handleOrientationChange);
        
        // 初期化
        setViewportHeight();
        
        // スマホ用スライド機能
        function initMobileSlide() {
            // スマホ判定（600px以下、または横向きで900px以下かつ500px以下）
            const isMobile = window.innerWidth <= 600 || 
                            (window.innerWidth <= 900 && window.innerHeight <= 500);
            if (!isMobile) return;
            
            const container = document.getElementById('game-container');
            if (!container) return;
            
            let touchStartX = 0;
            let touchEndX = 0;
            let isTableShown = false;
            
            // タッチ開始
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            // タッチ終了
            container.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const swipeThreshold = 50; // 50px以上のスワイプで反応
                const diff = touchStartX - touchEndX;
                
                // 左スワイプ（活用表を表示）
                if (diff > swipeThreshold && !isTableShown) {
                    showTable();
                }
                // 右スワイプ（ピースを表示）
                else if (diff < -swipeThreshold && isTableShown) {
                    showPieces();
                }
            }
            
            function showTable() {
                isTableShown = true;
                document.getElementById('mobile-slide-container')?.classList.add('show-table');
            }
            
            function showPieces() {
                isTableShown = false;
                document.getElementById('mobile-slide-container')?.classList.remove('show-table');
            }
            
            // グローバルに関数を公開（ヒントボタン用）
            window.mobileShowTable = showTable;
            window.mobileShowPieces = showPieces;
        }
        
        // スマホの場合はスライド機能を初期化
        const isMobile = window.innerWidth <= 600 || 
                        (window.innerWidth <= 900 && window.innerHeight <= 500);
        if (isMobile) {
            // ゲーム開始後に初期化
            setTimeout(initMobileSlide, 100);
        }

        // 初期表示（ゲーム開始前）
        function initDisplay() {
            document.getElementById("target-word").textContent = "品詞とレベルを選んでね";
            document.getElementById("katsuyo-type").style.display = "none";
            document.getElementById("conjugation-table").style.display = "none";
            updateLevelButtons();
            updateBestScoreDisplay();
            
            // 初期はLv5ボタンを表示（動詞モードがデフォルト）
            document.getElementById('lv5-btn').style.display = '';
        }
        
        initDisplay();
    </script>
