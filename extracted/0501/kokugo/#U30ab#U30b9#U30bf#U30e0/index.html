<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My品詞仕分けゲーム</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    </script>
  </head>
  <body>
    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
      <h1>品詞カスタム</h1>
      <p>
        練習したい品詞を選ぼう！<br />
        ランキングでみんなと競えるぞ！
      </p>
      <p3>Produce by igami</p3>

      <div id="typeSelection">
        <h3>出題する品詞を選択してください</h3>
        <div id="typeCheckboxes">
          <!-- チェックボックスはJavaScriptで動的に生成 -->
        </div>
      </div>

      <div class="button-container">
        <div class="button-row">
          <button id="bonusToggleButton">ボーナス: OFF</button>
          <button id="startButton">START</button>
        </div>
        <button id="backButton">戻る</button>
      </div>

      <div id="rankingContainer">
        <h2>グローバルランキング</h2>
        <p>
          <!-- ボーナスON/OFF切り替え後、ここに表示が更新されます -->
        </p>
        <table id="ranking-table">
          <colgroup>
            <col style="width: 10%" /> <!-- 順位 -->
            <col style="width: 20%" /> <!-- 日付 -->
            <col style="width: 45%" /> <!-- プレイヤー名 -->
            <col style="width: 25%" /> <!-- スコア -->
          </colgroup>
          <thead>
            <tr>
              <th>順位</th>
              <th>日付</th>
              <th>プレイヤー名</th>
              <th>スコア</th>
            </tr>
          </thead>
          <tbody>
            <!-- ランキングがここに表示される -->
          </tbody>
        </table>
        <button id="resetRankingButton">リセット</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen" style="display: none">
      <!-- ヘッダー：タイマー・スコア・COMBO・MAX -->
      <div id="header">
        <div id="timer">Time: 60</div>
        <div id="score">Score: 0</div>
        <div id="combo">Combo: 0</div>
        <div id="maxCombo">Max: 0</div>
      </div>
      <div id="playArea"></div>
      <button id="returnButton">Return to START</button>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <!-- Game Scripts -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="worddata.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
